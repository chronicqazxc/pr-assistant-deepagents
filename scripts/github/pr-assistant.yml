name: PR Assistant

on:
  issue_comment:
    types: [created]

jobs:
  pr-assistant:
    if: >
      contains(github.event.comment.body, vars.TRIGGER_KEYWORD)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone PR Assistant
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PR_ASSISTANT_REPO }}
          path: pr-assistant
          ref: main
          sparse-checkout: |
            scripts
            src/pr_assistant/agents
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Setup environment
        run: |
          # Create .env file from secrets/variables
          cat > .env << EOF
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER=${{ vars.LLM_PROVIDER }}
          OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL || 'http://localhost:11434' }}
          OLLAMA_MODEL=${{ vars.OLLAMA_MODEL || 'gpt-oss:20b' }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY || '' }}
          ANTHROPIC_MODEL=${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY || '' }}
          GEMINI_MODEL=${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          TRIGGER_KEYWORD=${{ vars.TRIGGER_KEYWORD }}
          EOF
          bash pr-assistant/scripts/github/01-setup-environment.sh
        env:
          PR_URL: ${{ github.event.issue.html_url }}
          USER: ${{ github.actor }}

      - name: Prefetch data
        run: bash pr-assistant/scripts/github/02-prefetch-data.sh

      - name: Run review
        run: bash pr-assistant/scripts/github/03-run-review.sh
