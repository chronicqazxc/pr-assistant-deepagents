name: PR Assistant

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr-assistant:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone PR Assistant
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PR_ASSISTANT_REPO }}
          path: pr-assistant
          ref: main
          sparse-checkout: |
            scripts
            src/pr_assistant/agents
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Setup environment
        run: bash pr-assistant/scripts/github/01-setup-environment.sh
        env:
          PR_URL: ${{ github.event.pull_request.html_url || github.event.issue.html_url }}
          USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}

      - name: Prefetch data
        run: bash pr-assistant/scripts/github/02-prefetch-data.sh

      - name: Run review
        run: bash pr-assistant/scripts/github/03-run-review.sh
