name: PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-assistant:
    # Trigger if keyword is in a PR conversation comment OR an inline diff comment
    if: >
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, vars.TRIGGER_KEYWORD)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, vars.TRIGGER_KEYWORD))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      TRIGGER_KEYWORD: ${{ vars.TRIGGER_KEYWORD }}
      # Use the correct URL depending on which event triggered it
      PR_URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
      GITHUB_USER: ${{ github.actor }}

    steps:
      - name: Clone PR Assistant
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PR_ASSISTANT_REPO }}
          path: pr-assistant
          ref: main
          sparse-checkout: |
            scripts
            src/pr_assistant
            pyproject.toml
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd pr-assistant
          pip install uv
          uv sync

      - name: Setup environment
        run: |
          cd pr-assistant
          cat > .env << EOF
          GH_TOKEN=$GH_TOKEN
          LLM_PROVIDER=$LLM_PROVIDER
          OLLAMA_BASE_URL=$OLLAMA_BASE_URL
          OLLAMA_MODEL=$OLLAMA_MODEL
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          ANTHROPIC_MODEL=$ANTHROPIC_MODEL
          GOOGLE_API_KEY=$GOOGLE_API_KEY
          GEMINI_MODEL=$GEMINI_MODEL
          TRIGGER_KEYWORD=$TRIGGER_KEYWORD
          EOF
          bash scripts/github/01-setup-environment.sh

      - name: Prefetch data
        run: |
          cd pr-assistant
          bash scripts/github/02-prefetch-data.sh

      - name: Run review
        run: |
          cd pr-assistant
          bash scripts/github/03-run-review.sh
